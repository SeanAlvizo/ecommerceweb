[phases.setup]
nixPkgs = ["php80", "php80Packages.composer", "nodejs"]

[phases.install]
cmds = ["composer install --no-interaction --prefer-dist --optimize-autoloader"]

[phases.build]
cmds = ["php artisan key:generate", "php artisan storage:link"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"
